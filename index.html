<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的动态博客管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }

        /* 编辑器样式 */
        .editor-section {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-bottom: 3rem;
        }

        .editor-section h2 { margin-bottom: 1.5rem; color: var(--primary); }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: inherit;
        }

        textarea { height: 150px; resize: vertical; }

        .btn-group { display: flex; gap: 10px; }

        button {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { background: #4f46e5; }
        .btn-cancel { background: #e5e7eb; color: #4b5563; }

        /* 文章列表样式 */
        .post-card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            position: relative;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .post-card h3 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        .post-date { font-size: 0.85rem; color: #9ca3af; margin-bottom: 1rem; }
        .post-content { color: #4b5563; white-space: pre-wrap; }

        .post-actions {
            margin-top: 1.5rem;
            display: flex;
            gap: 15px;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }

        .action-btn { background: none; color: #6b7280; font-size: 0.9rem; padding: 0; }
        .action-btn:hover { color: var(--primary); }
        .delete-btn:hover { color: #ef4444; }

        .empty-state { text-align: center; color: #9ca3af; padding: 3rem; }
    </style>
</head>
<body>

<div class="container">
    <header style="margin-bottom: 2rem; text-align: center;">
        <h1>我的动态博客助手</h1>
        <p>随时记录、随时修改、永不丢失</p>
    </header>

    <section class="editor-section">
        <h2 id="editorTitle">撰写新文章</h2>
        <input type="hidden" id="editIndex">
        <input type="text" id="postTitle" placeholder="文章标题...">
        <textarea id="postContent" placeholder="开始你的创作..."></textarea>
        <div class="btn-group">
            <button class="btn-save" onclick="savePost()">发布文章</button>
            <button class="btn-cancel" onclick="resetEditor()">清空重置</button>
        </div>
    </section>

    <div id="postsContainer">
        </div>
</div>

<script>
    // 初始化数据
    let posts = JSON.parse(localStorage.getItem('myBlogPosts')) || [];

    // 保存或更新文章
    function savePost() {
        const title = document.getElementById('postTitle').value;
        const content = document.getElementById('postContent').value;
        const editIndex = document.getElementById('editIndex').value;

        if (!title || !content) {
            alert("标题和内容都不能为空哦！");
            return;
        }

        const postData = {
            title: title,
            content: content,
            date: new Date().toLocaleString(),
        };

        if (editIndex === "") {
            // 新增
            posts.unshift(postData);
        } else {
            // 修改
            posts[editIndex] = postData;
        }

        localStorage.setItem('myBlogPosts', JSON.stringify(posts));
        resetEditor();
        renderPosts();
    }

    // 渲染文章列表
    function renderPosts() {
        const container = document.getElementById('postsContainer');
        container.innerHTML = '';

        if (posts.length === 0) {
            container.innerHTML = '<div class="empty-state">还没有文章，快去写一篇吧！</div>';
            return;
        }

        posts.forEach((post, index) => {
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <h3>${post.title}</h3>
                <div class="post-date"><i class="far fa-clock"></i> ${post.date}</div>
                <div class="post-content">${post.content}</div>
                <div class="post-actions">
                    <button class="action-btn" onclick="editPost(${index})"><i class="fas fa-edit"></i> 编辑</button>
                    <button class="action-btn delete-btn" onclick="deletePost(${index})"><i class="fas fa-trash"></i> 删除</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 进入编辑模式
    function editPost(index) {
        const post = posts[index];
        document.getElementById('postTitle').value = post.title;
        document.getElementById('postContent').value = post.content;
        document.getElementById('editIndex').value = index;
        document.getElementById('editorTitle').innerText = "修改文章内容";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 删除文章
    function deletePost(index) {
        if (confirm("确定要删除这篇文章吗？")) {
            posts.splice(index, 1);
            localStorage.setItem('myBlogPosts', JSON.stringify(posts));
            renderPosts();
        }
    }

    // 重置编辑器
    function resetEditor() {
        document.getElementById('postTitle').value = "";
        document.getElementById('postContent').value = "";
        document.getElementById('editIndex').value = "";
        document.getElementById('editorTitle').innerText = "撰写新文章";
    }

    // 页面加载时渲染
    renderPosts();
</script>

</body>
</html>
